# Render blueprint. With this file in the repo you can point Render at the
# project and it configures the service itself.
#
# FLASK_SECRET_KEY is generated by Render.
# GEMINI_API_KEY must be set by hand in the dashboard — never commit it.

services:
  - type: web
    name: codepilot-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: ALLOW_KEY_EDITING
        value: "0"
      - key: EMBED_BACKEND
        value: gemini
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
